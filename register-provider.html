<!DOCTYPE html>
<html>
<head>
<title>Register as a Service Provider - Velix</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f8fafc;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#0f172a;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Register as a Service Provider</h1>

<label>Business or Service Name</label>
<input type="text">

<label>Full Name</label>
<input type="text">

<label>Country</label>
<input type="text">

<label>State</label>
<input type="text">

<label>City</label>
<input type="text">

<label>Phone Number</label>
<input type="tel">

<label>Email Address</label>
<input type="email">

<label>Service Category</label>
<select>
<option>Home Repairs</option>
<option>Electrician</option>
<option>Plumber</option>
<option>Cleaning Services</option>
<option>Beauty & Barber</option>
<option>Photography</option>
<option>Graphic Design</option>
</select>

<button>Submit Registration</button>

<a href="home-repairs.html">⬅ Back to Home Repairs</a>

</div>

</body>
</html>
