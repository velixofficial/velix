<!DOCTYPE html>
<html>
<head>
<title>Post Property - Velix</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f8fafc;
margin:0;
text-align:center;
}

header{
background:#0f172a;
color:white;
padding:40px;
}

.card{
background:white;
margin:20px auto;
padding:20px;
max-width:600px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input, textarea{
width:90%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

a{
text-decoration:none;
color:#2563eb;
font-weight:bold;
display:block;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Post Property</h1>
</header>

<div class="card">

<input type="text" placeholder="Property Title">

<textarea placeholder="Property Description"></textarea>

<input type="text" placeholder="Price">

<input type="text" placeholder="Location">

<input type="tel" placeholder="Phone Number">

<input type="email" placeholder="Email Address">

<br><br>

<button>Post Property</button>

<a href="property.html">⬅ Back to Property</a>

</div>

</body>
</html>
